app = 'ai-village'
primary_region = 'nrt'
kill_timeout = '120s'

[build]

[env]
  PORT = "8080"
  # NODE_ENV is set to "production" automatically by Fly.io builds.
  # REDIS_URL must be injected as a secret:
  #   fly redis create --name ai-village-redis --region nrt
  #   fly redis status ai-village-redis   # copy Private URL
  #   fly secrets set REDIS_URL=<private-url>
  # Without REDIS_URL, the app runs in single-instance mode (no horizontal scaling).

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  # Keep at 1 until Redis is provisioned. Once REDIS_URL is set, safe to increase.
  min_machines_running = 1

[checks]
  [checks.health]
    port = 8080
    type = 'http'
    interval = '30s'
    timeout = '15s'
    path = '/api/health'
