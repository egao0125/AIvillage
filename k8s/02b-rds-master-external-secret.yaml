# ---------------------------------------------------------------------------
# ExternalSecret — RDS managed master password (for db-migrate Job only)
#
# The RDS master password is auto-managed by AWS Secrets Manager when
# manage_master_user_password = true is set in Terraform.
#
# After terraform apply, get the secret name and fill in the key values below:
#   terraform output rds_master_secret_arn
#   # Extract the secret name (last path component, e.g. rds!db-ai-village-postgres-XXXXXXXX)
#
# Then apply:
#   kubectl apply -f k8s/02b-rds-master-external-secret.yaml
#
# This secret is ONLY used by db-migrate Job, not by the application pod.
# ---------------------------------------------------------------------------
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: rds-master-secret
  namespace: ai-village
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: rds-master-secret
    creationPolicy: Owner
    deletionPolicy: Delete
  data:
    # RDS managed master secret stores {"username":"...", "password":"..."} JSON.
    # Replace REPLACE_WITH_RDS_MASTER_SECRET_NAME with the secret name from:
    #   terraform output rds_master_secret_arn | sed 's/.*secret://'
    # Example key: rds!db-ai-village-postgres-AbCdEf
    - secretKey: username
      remoteRef:
        key: "REPLACE_WITH_RDS_MASTER_SECRET_NAME"
        property: username
    - secretKey: password
      remoteRef:
        key: "REPLACE_WITH_RDS_MASTER_SECRET_NAME"
        property: password
