apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ai-village
  namespace: ai-village
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ai-village
  # -----------------------------------------------------------------------
  # maxReplicas: 2 — leader election により1Podがシミュレーションを担当。
  # 2Pod目はHTTP/WS読み込みサービング + リーダーフェイルオーバー待機。
  # 書き込みエンドポイント (POST /api/agents等) はリーダーPodのみ受け付け。
  # 詳細: packages/server/src/cluster/leader-election.ts
  # -----------------------------------------------------------------------
  minReplicas: 1
  maxReplicas: 2
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      # Never scale below 1 replica; wait 5 min before scaling down to avoid flapping.
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
