apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ai-village
  namespace: ai-village
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ai-village
  # -----------------------------------------------------------------------
  # maxReplicas is intentionally 1.
  #
  # The simulation engine is stateful (agent state lives in process memory).
  # Multiple replicas would each run an independent simulation — split state.
  #
  # To enable horizontal scaling, the following must be completed first:
  #   1. fix/supabase-single-row  — world/agent state persisted per-agent row
  #      instead of a single id:'current' row (eliminates Last Write Wins)
  #   2. Shared agent state store  — AgentController state externalised to
  #      Redis or DB so all pods share one simulation
  #   3. Uncomment sticky sessions in 05-ingress.yaml
  #
  # Once done, set maxReplicas: 3 (or higher) and re-apply.
  # -----------------------------------------------------------------------
  minReplicas: 1
  maxReplicas: 1
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      # Never scale below 1 replica; wait 5 min before scaling down to avoid flapping.
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
