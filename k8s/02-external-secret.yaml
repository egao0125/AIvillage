# ---------------------------------------------------------------------------
# ClusterSecretStore — ESO uses IRSA (pod's SA) to auth with AWS
# ---------------------------------------------------------------------------
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: ap-northeast-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
---
# ---------------------------------------------------------------------------
# ExternalSecret — syncs all ai-village/* secrets into one k8s Secret
# ---------------------------------------------------------------------------
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ai-village-secret
  namespace: ai-village
spec:
  # 5m: ensures secret rotation (Secrets Manager) propagates to pods within 5 minutes.
  # 1h was too slow — an emergency rotation would leave pods with stale credentials
  # for up to 60 min. NIST SP 800-53 IA-5(1)(e) recommends prompt rotation propagation.
  refreshInterval: 5m
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: ai-village-secret
    creationPolicy: Owner
    deletionPolicy: Delete
  data:
    # Encryption key
    - secretKey: ENCRYPTION_KEY
      remoteRef:
        key: ai-village/encryption-key
        property: ENCRYPTION_KEY
    # Dev admin token: intentionally NOT synced to production pods.
    # DEV_ADMIN_TOKEN must never be set in production (enforced at startup).
    # Redis URL
    - secretKey: REDIS_URL
      remoteRef:
        key: ai-village/redis-url
        property: REDIS_URL
    # DB credentials (from JSON object secret)
    - secretKey: DB_HOST
      remoteRef:
        key: ai-village/db-app-user
        property: host
    - secretKey: DB_PORT
      remoteRef:
        key: ai-village/db-app-user
        property: port
    - secretKey: DB_NAME
      remoteRef:
        key: ai-village/db-app-user
        property: dbname
    - secretKey: DB_USER
      remoteRef:
        key: ai-village/db-app-user
        property: username
    - secretKey: DB_PASSWORD
      remoteRef:
        key: ai-village/db-app-user
        property: password
    # Cognito app client secret — Terraform writes this directly (no REPLACE_AFTER_APPLY needed).
    # generate_secret=true causes Cognito to generate this; Terraform stores it in Secrets Manager.
    - secretKey: COGNITO_CLIENT_SECRET
      remoteRef:
        key: ai-village/cognito-client-secret
        property: COGNITO_CLIENT_SECRET
    # Anthropic API key — global narrator/recap fallback (optional in pure-BYOK mode).
    # Empty string is safe: engine skips narrator/recap if key is blank.
    - secretKey: ANTHROPIC_API_KEY
      remoteRef:
        key: ai-village/anthropic-api-key
        property: ANTHROPIC_API_KEY
