# ---------------------------------------------------------------------------
# ClusterSecretStore — ESO uses IRSA (pod's SA) to auth with AWS
# ---------------------------------------------------------------------------
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: ap-northeast-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
---
# ---------------------------------------------------------------------------
# ExternalSecret — syncs all ai-village/* secrets into one k8s Secret
# ---------------------------------------------------------------------------
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ai-village-secret
  namespace: ai-village
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: ai-village-secret
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    # Encryption key
    - secretKey: ENCRYPTION_KEY
      remoteRef:
        key: ai-village/encryption-key
        property: ENCRYPTION_KEY
    # Dev admin token
    - secretKey: DEV_ADMIN_TOKEN
      remoteRef:
        key: ai-village/dev-admin-token
        property: DEV_ADMIN_TOKEN
    # Redis URL
    - secretKey: REDIS_URL
      remoteRef:
        key: ai-village/redis-url
        property: REDIS_URL
    # DB credentials (from JSON object secret)
    - secretKey: DB_HOST
      remoteRef:
        key: ai-village/db-app-user
        property: host
    - secretKey: DB_PORT
      remoteRef:
        key: ai-village/db-app-user
        property: port
    - secretKey: DB_NAME
      remoteRef:
        key: ai-village/db-app-user
        property: dbname
    - secretKey: DB_USER
      remoteRef:
        key: ai-village/db-app-user
        property: username
    - secretKey: DB_PASSWORD
      remoteRef:
        key: ai-village/db-app-user
        property: password
