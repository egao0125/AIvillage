apiVersion: v1
kind: Namespace
metadata:
  name: ai-village
  labels:
    app.kubernetes.io/name: ai-village
    app.kubernetes.io/managed-by: kubectl
    # Pod Security Standards (PSS) — enforce restricted profile for all pods in this namespace.
    # CIS EKS Benchmark 5.2 / Kubernetes v1.25+ built-in admission controller.
    # Pods that violate the policy will be rejected at creation time.
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
