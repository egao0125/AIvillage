apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-village
  namespace: ai-village
  annotations:
    # AWS Load Balancer Controller (must be installed in the cluster).
    # Install guide: https://kubernetes-sigs.github.io/aws-load-balancer-controller/
    kubernetes.io/ingress.class: alb

    # internet-facing: reachable from the public internet.
    # Use "internal" if serving only within a VPC.
    alb.ingress.kubernetes.io/scheme: internet-facing

    # ip mode: routes traffic directly to pod IPs (requires VPC CNI).
    # Avoids double-hop through kube-proxy (better latency for Socket.IO).
    alb.ingress.kubernetes.io/target-type: ip

    # HTTP-only until ACM certificate and domain are provisioned.
    # To enable HTTPS:
    #   1. Request ACM cert: aws acm request-certificate --domain-name <DOMAIN> --validation-method DNS
    #   2. Replace REPLACE_WITH_ACM_CERTIFICATE_ARN below with the cert ARN
    #   3. Replace aivillage.example.com with the real domain
    #   4. Uncomment the listen-ports/ssl-redirect/certificate-arn lines and remove HTTP-only line
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'
    # alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    # alb.ingress.kubernetes.io/ssl-redirect: "443"
    # alb.ingress.kubernetes.io/certificate-arn: REPLACE_WITH_ACM_CERTIFICATE_ARN

    # WAFv2 Web ACL — protects against OWASP Top 10, bad IPs, Log4Shell, SSRF.
    # Set the ARN from: terraform output waf_web_acl_arn
    # (CIS AWS Foundations Benchmark 6.7 / NIST SP 800-53 SC-5, SI-3)
    alb.ingress.kubernetes.io/wafv2-web-acl-arn: REPLACE_WITH_WAF_WEB_ACL_ARN

    # Increase idle timeout to 120 s for long-lived Socket.IO WebSocket connections.
    # ALB default is 60 s; connections are silently dropped without this.
    alb.ingress.kubernetes.io/load-balancer-attributes: idle_timeout.timeout_seconds=120

    # -----------------------------------------------------------------------
    # Sticky sessions — uncomment when replicas > 1.
    # Socket.IO HTTP long-polling requires all requests from the same client
    # to reach the same pod. WebSocket does not need stickiness once upgraded.
    # -----------------------------------------------------------------------
    # alb.ingress.kubernetes.io/target-group-attributes: stickiness.enabled=true,stickiness.lb_cookie.duration_seconds=86400
spec:
  rules:
    - host: aivillage.example.com   # replace with actual domain
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ai-village
                port:
                  number: 80
