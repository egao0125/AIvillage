# This file described a manual base64-encoded Secret for Supabase.
# It is no longer used. Secrets are now managed by ESO:
#   - k8s/02-external-secret.yaml  — syncs ai-village/* from Secrets Manager
#   - k8s/02b-rds-master-external-secret.yaml  — RDS master credentials (migrate job only)
#
# To set up secrets for a new environment:
#   1. terraform apply  (creates Secrets Manager resources)
#   2. aws secretsmanager put-secret-value ...  (set real values)
#   3. kubectl apply -k k8s/  (ESO syncs into ai-village-secret)
#
# See k8s/kustomization.yaml for the full pre-apply checklist.
