# ============================================================
# SECRET TEMPLATE — DO NOT COMMIT REAL VALUES
# ============================================================
# 1. Copy this file:  cp k8s/02-secret.example.yaml k8s/02-secret.yaml
# 2. Fill in base64-encoded values (see comments below)
# 3. Apply:           kubectl apply -f k8s/02-secret.yaml
#
# To base64-encode a value:
#   echo -n 'your-value-here' | base64
#
# k8s/02-secret.yaml is in .gitignore — never committed.
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: ai-village-secret
  namespace: ai-village
type: Opaque
data:
  # Supabase project URL: https://xxxxxxxxxxx.supabase.co
  SUPABASE_URL: REPLACE_WITH_BASE64

  # Supabase service role key (not the anon key — grants full DB access)
  SUPABASE_SERVICE_ROLE_KEY: REPLACE_WITH_BASE64

  # Redis connection URL: redis://ai-village-redis.ai-village.svc.cluster.local:6379
  # or ElastiCache endpoint: redis://clustercfg.<name>.<id>.<region>.cache.amazonaws.com:6379
  REDIS_URL: REPLACE_WITH_BASE64

  # 64-char hex AES-256-GCM encryption key for stored API keys.
  # Generate: node -e "console.log(require('crypto').randomBytes(32).toString('hex'))"
  ENCRYPTION_KEY: REPLACE_WITH_BASE64

  # Dev admin token for Socket.IO dev:* events. Use a strong random string.
  # In production, restrict with network policy so only internal tools can access it.
  DEV_ADMIN_TOKEN: REPLACE_WITH_BASE64
