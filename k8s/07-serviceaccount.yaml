apiVersion: v1
kind: ServiceAccount
metadata:
  name: ai-village
  namespace: ai-village
  annotations:
    # IRSA: this SA assumes the app IAM role managed by Terraform.
    # Replace the ARN below with the actual value before applying:
    #   terraform output app_irsa_role_arn
    eks.amazonaws.com/role-arn: "arn:aws:iam::REPLACE_WITH_AWS_ACCOUNT_ID:role/ai-village-app"
